name: lab-equipment

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: lab_root_password
      MYSQL_DATABASE: lab_equipment
      MYSQL_USER: lab_user
      MYSQL_PASSWORD: lab_password
    volumes:
      - lab_equipment_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -ulab_user -plab_password --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      PORT: 3000
      JWT_SECRET: lab-equipment-local-secret
      DATABASE_URL: mysql://lab_user:lab_password@mysql:3306/lab_equipment
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
    environment:
      API_BASE_URL: http://backend:3000/api
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  lab_equipment_mysql:
